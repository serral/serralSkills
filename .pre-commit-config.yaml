# Pre-commit hooks for serralSkills.
#
# Design notes:
# - skills/ is VENDORED upstream content; formatters and whitespace fixers MUST NOT
#   touch it, or we'd drift from upstream (defeating the sync workflow). Excludes
#   are PER-HOOK (not global) so gitleaks still scans skills/ — that's the gate.
# - Local hooks at the bottom enforce repo-specific invariants.

repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.24.2
    hooks:
      - id: gitleaks
        # Scans skills/ too — known-safe placeholders are allowlisted in
        # .gitleaks.toml with file-scoped rules.

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '^skills/'
      - id: end-of-file-fixer
        exclude: '^skills/'
      - id: check-merge-conflict
      - id: check-yaml
        exclude: '^skills/'
      - id: check-json
        exclude: '^skills/'
      - id: check-added-large-files
        args: [--maxkb=500]

  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.0
    hooks:
      - id: ruff
        args: [--fix]
        files: '^scripts/.*\.py$'

  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.10.0.1
    hooks:
      - id: shellcheck
        files: '^scripts/.*\.sh$'

  - repo: local
    hooks:
      - id: marketplace-in-sync
        name: marketplace.json matches plugins/
        entry: python3 scripts/manifest.py --check
        language: system
        pass_filenames: false
        files: '^(plugins/.*/\.claude-plugin/plugin\.json|\.claude-plugin/marketplace\.json|scripts/manifest\.py)$'

      - id: skills-pattern-audit
        name: scripts/audit.sh (curl|sh / base64-d / executable-download grep)
        entry: bash scripts/audit.sh
        language: system
        pass_filenames: false
        files: '^(skills/.*|vendor/.*\.lock|scripts/audit\.sh)$'
